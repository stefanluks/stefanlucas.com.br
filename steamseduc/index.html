<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Steam da Seduc</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg bg-dark">
    <nav class="navbar navbar-expand-lg navbar-dark bg bg-dark" style="box-shadow: 0 0 10px white;">
        <div class="container-fluid">
            <a class="navbar-brand text-light" href="#">Stefan Lucas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link active" aria-current="page" href="/">Voltar para o Inicio</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container h-100 text-center p-3 d-flex align-items-center flex-column">
        <img src="../public/imagens/SEDUC.png" alt="" class="w-25 img-fluid my-3">
        <div id="btn-download" class="btn btn-light my-3 w-25">Baixar: <b class="text-danger">sistema_flask.zip</b></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


    <div id="cursor-follower">
        <img src="../public/imagens/gamepad.webp" alt="Joystick">
    </div>

    <script>
        const follower = document.getElementById('cursor-follower');
        const btnDownload = document.getElementById('btn-download');

        document.addEventListener('mousemove', (e) => {
            // Atualiza a posição da div baseada nas coordenadas do mouse
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        btnDownload.addEventListener("click", () => {
            window.location.href = "../public/sistemas/sistema_flask.zip";
        });
    </script>
</body>

</html>
