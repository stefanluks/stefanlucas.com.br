<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Mulheres ⋆.𐙚</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            /* Degradê místico que une todas as vibes */
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Efeito de brilhos flutuantes no fundo */
        body::before {
            content: "✨";
            position: absolute;
            top: 10%;
            left: 10%;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
        }

        body::after {
            content: "🌸";
            position: absolute;
            bottom: 15%;
            right: 12%;
            font-size: 1.5rem;
            opacity: 0.3;
            animation: float 8s infinite ease-in-out reverse;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #6a1b9a;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0px #fff;
            animation: fadeIn 1.5s ease-out;
        }

        /* Container dos Links */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 320px;
            padding: 20px;
        }

        .link {
            text-decoration: none;
            color: #4a4a4a;
            background: rgba(255, 255, 255, 0.7);
            padding: 18px 25px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 1.1rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: block;
        }

        /* Cores individuais no hover para cada uma */
        .link:nth-child(1):hover { color: #d4af37; border-color: #d4af37; transform: scale(1.05); } /* Mãe: Dourado */
        .link:nth-child(2):hover { color: #ff85a2; border-color: #ff85a2; transform: scale(1.05); } /* Laura: Rosa */
        .link:nth-child(3):hover { color: #1a2a6c; border-color: #1a2a6c; transform: scale(1.05); } /* Maninha: Azul */
        .link:nth-child(4):hover { color: #e91e63; border-color: #e91e63; transform: scale(1.05); } /* Gih: Rubi */

        .link:hover {
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

        /* Responsividade */
        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .link { padding: 15px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <h1>⋆.𐙚 ̊ Minhas Mulheres₊˚⊹♡</h1>

    <div class="menu-container">
        <a href="./maezinha.html" class="link">Mãezinha ˗ˋˏ♡ˎˊ˗</a>
        <a href="./laurahinata.html" class="link">Laura Hinata 𓆩❤︎𓆪</a>
        <a href="./maninha.html" class="link">Minha Maninha 𖹭.ᐟ</a>
        <a href="./gih.html" class="link">My Gih ❤️</a>
    </div>

</body>
</html>
